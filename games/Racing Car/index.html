<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game">
        <div class="hud">
            <div class="score">
                Score :
                <span id="score">0</span>
            </div>
            <div class="speed">
                Speed :
                <span id="speed">1</span>x
            </div>
        </div>
        <div class="road" id="road">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div id="player" class="car">
                <img src="images/heroCar.png" alt="">
            </div>
        </div>
        <div class="controls">
            <button id="startBtn">
                Start Game
            </button>
            <button id="restartBtn">
                Restart
            </button>
        </div>
    </div>
    <script src="../../script.js"></script>
    <script src="script.js"></script>

</body>
</html>
